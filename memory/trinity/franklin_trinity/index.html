    <script>
        // SNOW
        const cvs=document.getElementById('snow-canvas'), ctx=cvs.getContext('2d');
        let w,h,flakes=[]; function resize(){w=cvs.width=window.innerWidth;h=cvs.height=window.innerHeight;}
        function init(){flakes=[];for(let i=0;i<100;i++)flakes.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*2,s:Math.random()+0.5});}
        function draw(){ctx.clearRect(0,0,w,h);ctx.fillStyle="rgba(255,255,255,0.7)";ctx.beginPath();
        flakes.forEach(f=>{ctx.moveTo(f.x,f.y);ctx.arc(f.x,f.y,f.r,0,Math.PI*2);f.y+=f.s;if(f.y>h){f.y=0;f.x=Math.random()*w;}});ctx.fill();requestAnimationFrame(draw);}
        window.onresize=()=>{resize();init();};resize();init();draw();

        drop.ondragleave=()=>drop.classList.remove('active');
