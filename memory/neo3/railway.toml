# Railway Configuration for Neo3 Backend Services
# This file configures the Express Backend and Python Marketplace services

[build]
builder = "NIXPACKS"
buildCommand = "npm install"

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "neo3-backend"
source = "backend"

[services.env]
PORT = "3000"
NODE_ENV = "production"

[[services]]
name = "neo3-marketplace"
source = "."

[services.env]
MARKETPLACE_PORT = "8080"
