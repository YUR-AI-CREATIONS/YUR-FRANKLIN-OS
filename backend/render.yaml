services:
  - type: web
    name: sovereign-genesis-api
    runtime: python
    pythonVersion: "3.11"
    
    # Build configuration
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    
    # Resource allocation
    plan: starter
    
    # Health check
    healthCheckPath: /api/
    
    # Auto-deployment
    autoDeploy: true
    
    # Environment variables (non-sensitive)
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "*"
      - key: DB_NAME
        value: sgp_production
